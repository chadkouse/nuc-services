apiVersion: v1
kind: Service
metadata:
  name: unifi-network-application
spec:
  ports:
  - name: webui
    port: 8443
    protocol: TCP
    targetPort: 8443
  - name: device-inform
    port: 8080
    protocol: TCP
    targetPort: 8080
  - name: speedtest
    port: 6789
    protocol: TCP
    targetPort: 6789
  selector:
    run: unifi-network-application

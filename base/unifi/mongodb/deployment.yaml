apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
spec:
  strategy:
    type: Recreate
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      run: mongodb
  template:
    metadata:
      labels:
        run: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7.0
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: root
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: unifi-mongodb
              key: mongo-root-password
        - name: MONGO_UNIFI_PASSWORD
          valueFrom:
            secretKeyRef:
              name: unifi-mongodb
              key: mongo-unifi-password
        ports:
        - containerPort: 27017
          name: mongo
          protocol: TCP
        volumeMounts:
        - mountPath: /data/db
          name: mongodb-data
        - mountPath: /docker-entrypoint-initdb.d
          name: mongodb-init
      volumes:
      - name: mongodb-init
        configMap:
          name: mongodb-init
          defaultMode: 0755

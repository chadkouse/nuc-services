---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    run: uptime-kuma
  name: uptime-kuma
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      run: uptime-kuma
  template:
    metadata:
      labels:
        run: uptime-kuma
    spec:
      containers:
      - env:
        - name: TZ
          value: America/New_York
        image: louislam/uptime-kuma
        name: uptime-kuma
        ports:
        - containerPort: 3001
          name: web
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /
            port: 3001
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 2
        livenessProbe:
          failureThreshold: 3
          initialDelaySeconds: 30
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 3001
          timeoutSeconds: 1
        volumeMounts:
        - mountPath: /app/data
          name: data

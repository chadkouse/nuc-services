apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: perfect-water
spec:
  namespace: argocd
  writeBackConfig:
    method: "git:secret:argocd-image-updater-system/git-creds"
    gitConfig:
      writeBackTarget: "kustomization"
  applicationRefs:
    - namePattern: "perfect-water"
      commonUpdateSettings:
        updateStrategy: "digest"
        forceUpdate: false
      images:
        - alias: "perfect-water"
          imageName: "ghcr.io/chadkouse/perfect-water:latest"
          commonUpdateSettings:
            pullSecret: "pullsecret:argocd-image-updater-system/ghcr-pull"

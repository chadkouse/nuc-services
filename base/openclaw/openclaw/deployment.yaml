---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    run: openclaw
  name: openclaw
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      run: openclaw
  template:
    metadata:
      labels:
        run: openclaw
    spec:
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        fsGroup: 1000
      containers:
      - name: openclaw
        image: ghcr.io/openclaw/openclaw:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: TZ
          value: America/New_York
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: ANTHROPIC_API_KEY
        - name: OLLAMA_API_KEY
          value: ollama-local
        - name: OPENCLAW_CONFIG_PATH
          value: /home/node/.openclaw/openclaw.json
        ports:
        - containerPort: 18789
          name: web
          protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - mountPath: /data
          name: openclaw-data
        - mountPath: /home/node/.openclaw
          name: openclaw-data
          subPath: home
        - mountPath: /home/node/.config
          name: openclaw-data
          subPath: config
      - name: ollama
        image: ollama/ollama:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 11434
          name: ollama
          protocol: TCP
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: false
        volumeMounts:
        - mountPath: /root/.ollama
          name: ollama-data
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/sh
              - -c
              - until ollama list > /dev/null 2>&1; do sleep 2; done; ollama pull llama3.2:3b

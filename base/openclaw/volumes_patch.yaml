apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
spec:
  template:
    spec:
      volumes:
      - hostPath:
          path: /media/seagate/openclaw
          type: DirectoryOrCreate
        name: openclaw-data
      - hostPath:
          path: /media/seagate/ollama
          type: DirectoryOrCreate
        name: ollama-data
